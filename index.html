<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>環境経営診断システム</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; }
  .gradient-bg { background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%); }
  .card { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .answer-btn { transition: all 0.18s ease; }
  .ans-idle { opacity: 0.6; }
  .ans-selected { opacity: 1; transform: scale(1.02); box-shadow: 0 0 0 3px #fff, 0 0 0 5px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.2); }
  .ans-dim { opacity: 0.25; transform: scale(0.98); }
  #confirmBtn:not(:disabled) { cursor: pointer; }
  #confirmBtn:disabled { cursor: not-allowed; }
  .progress-fill { transition: width 0.4s ease; }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .rank-S { color: #7c3aed; }
  .rank-A { color: #059669; }
  .rank-B { color: #d97706; }
  .rank-C { color: #ea580c; }
  .rank-D { color: #dc2626; }
  @media print { .no-print { display: none; } }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ヘッダー -->
<header class="gradient-bg text-white py-4 px-4 sticky top-0 z-50 shadow-lg">
  <div class="max-w-2xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🌿</span>
      <span class="font-bold text-lg">環境経営診断</span>
    </div>
    <div id="progressInfo" class="text-sm opacity-80 hidden">
      <span id="currentQ">0</span> / <span id="totalQ">60</span> 問
    </div>
  </div>
</header>

<!-- プログレスバー -->
<div id="progressBar" class="hidden h-1.5 bg-green-900">
  <div id="progressFill" class="progress-fill h-full bg-green-400" style="width:0%"></div>
</div>

<main class="max-w-2xl mx-auto px-4 py-6">

  <!-- 画面1: スタート -->
  <div id="screen-start" class="fade-in">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🌍</div>
      <h1 class="text-2xl font-bold text-gray-800 mb-2">環境経営診断システム</h1>
      <p class="text-gray-500 text-sm">貴社の環境経営への対応状況を60問で診断します</p>
    </div>

    <div class="bg-white rounded-2xl card p-6 mb-6">
      <h2 class="font-bold text-gray-700 mb-4 text-center">📋 基本情報の入力</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">会社名 <span class="text-red-500">*</span></label>
          <input id="companyName" type="text" placeholder="株式会社〇〇" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">業種</label>
          <select id="industry" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white">
            <option value="">選択してください</option>
            <option>製造業</option>
            <option>建設業</option>
            <option>小売業・卸売業</option>
            <option>飲食業・食品業</option>
            <option>運輸・物流業</option>
            <option>医療・介護・福祉</option>
            <option>IT・情報サービス</option>
            <option>不動産業</option>
            <option>農林水産業</option>
            <option>その他サービス業</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">回答者名</label>
          <input id="respondentName" type="text" placeholder="担当者名（任意）" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">
            メールアドレス <span class="text-red-500">*</span>
            <span class="text-xs text-gray-400 font-normal ml-1">（診断結果をメールでお送りします）</span>
          </label>
          <input id="email" type="email" placeholder="example@company.com" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
      </div>
    </div>

    <div class="bg-green-50 rounded-2xl p-4 mb-6 border border-green-200">
      <h3 class="font-bold text-green-800 text-sm mb-2">📌 診断について</h3>
      <ul class="text-xs text-green-700 space-y-1">
        <li>✓ 全8カテゴリ・60問（所要時間：約10〜15分）</li>
        <li>✓ 各問「実施済み／一部実施／検討中／未着手」で回答</li>
        <li>✓ カテゴリ別レーダーチャートで強み・弱みを可視化</li>
        <li>✓ メールアドレスを入力すると結果が届きます</li>
      </ul>
    </div>

    <button onclick="startAssessment()" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl text-lg shadow-lg hover:opacity-90 transition no-print">
      診断を開始する →
    </button>
  </div>

  <!-- 画面2: 質問 -->
  <div id="screen-questions" class="hidden fade-in">
    <div class="bg-white rounded-2xl card p-5 mb-4">
      <div class="flex items-center gap-2 mb-1">
        <span id="categoryIcon" class="text-xl"></span>
        <span id="categoryName" class="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full"></span>
      </div>
      <p id="questionText" class="text-gray-800 font-medium text-base leading-relaxed"></p>
      <p id="questionNumber" class="text-xs text-gray-400 mt-2"></p>
    </div>

    <div id="answerButtons" class="space-y-3 mb-4">
      <button onclick="selectAnswer(3)" id="opt-3" class="answer-btn ans-idle w-full bg-green-600 text-white font-bold py-4 px-5 rounded-2xl text-left flex items-center gap-3 shadow">
        <span class="text-xl font-black">①</span>
        <div><div class="font-bold">実施済み</div><div class="text-xs opacity-80 font-normal">すでに継続的に取り組んでいる</div></div>
      </button>
      <button onclick="selectAnswer(2)" id="opt-2" class="answer-btn ans-idle w-full bg-blue-500 text-white font-bold py-4 px-5 rounded-2xl text-left flex items-center gap-3 shadow">
        <span class="text-xl font-black">②</span>
        <div><div class="font-bold">一部実施</div><div class="text-xs opacity-80 font-normal">取り組んでいるが不十分</div></div>
      </button>
      <button onclick="selectAnswer(1)" id="opt-1" class="answer-btn ans-idle w-full bg-yellow-500 text-white font-bold py-4 px-5 rounded-2xl text-left flex items-center gap-3 shadow">
        <span class="text-xl font-black">③</span>
        <div><div class="font-bold">検討中</div><div class="text-xs opacity-80 font-normal">今後取り組む予定がある</div></div>
      </button>
      <button onclick="selectAnswer(0)" id="opt-0" class="answer-btn ans-idle w-full bg-gray-400 text-white font-bold py-4 px-5 rounded-2xl text-left flex items-center gap-3 shadow">
        <span class="text-xl font-black">④</span>
        <div><div class="font-bold">未着手</div><div class="text-xs opacity-80 font-normal">まだ取り組んでいない</div></div>
      </button>
    </div>

    <button id="confirmBtn" onclick="confirmAnswer()" disabled
      class="w-full gradient-bg text-white font-bold py-4 rounded-2xl text-lg shadow-lg transition opacity-40 mb-3 no-print">
      この回答で決定する →
    </button>

    <button onclick="goBack()" id="backBtn" class="w-full border border-gray-300 text-gray-500 py-3 rounded-2xl text-sm hover:bg-gray-50 no-print">
      ← 前の問いに戻る
    </button>
  </div>

  <!-- 画面3: 結果 -->
  <div id="screen-result" class="hidden fade-in">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">📊</div>
      <h2 class="text-2xl font-bold text-gray-800">診断結果</h2>
      <p id="resultCompany" class="text-gray-500 text-sm mt-1"></p>
    </div>

    <!-- スコアカード -->
    <div class="bg-white rounded-2xl card p-6 mb-4 text-center">
      <div class="flex justify-center items-end gap-2 mb-1">
        <span id="totalScore" class="text-6xl font-black text-gray-800"></span>
        <span class="text-2xl text-gray-400 mb-2">/ 180点</span>
      </div>
      <div id="rankBadge" class="inline-block text-3xl font-black px-6 py-2 rounded-full mb-2"></div>
      <p id="rankLabel" class="text-gray-600 font-medium"></p>
      <div class="mt-3 bg-gray-100 rounded-full h-3 overflow-hidden">
        <div id="scoreBar" class="h-full bg-gradient-to-r from-green-400 to-green-600 rounded-full transition-all duration-1000" style="width:0%"></div>
      </div>
      <p id="scorePercent" class="text-sm text-gray-500 mt-1"></p>
    </div>

    <!-- レーダーチャート -->
    <div class="bg-white rounded-2xl card p-5 mb-4">
      <h3 class="font-bold text-gray-700 mb-4 text-center">カテゴリ別スコア</h3>
      <div style="max-height:320px;">
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <!-- カテゴリ別スコア一覧 -->
    <div class="bg-white rounded-2xl card p-5 mb-4">
      <h3 class="font-bold text-gray-700 mb-3">カテゴリ別詳細</h3>
      <div id="categoryScoreList" class="space-y-3"></div>
    </div>

    <!-- アドバイス -->
    <div class="bg-white rounded-2xl card p-5 mb-6">
      <h3 class="font-bold text-gray-700 mb-3">💡 改善アドバイス</h3>
      <div id="adviceList" class="space-y-3"></div>
    </div>

    <!-- アクションボタン -->
    <div class="space-y-3 no-print">
      <button onclick="saveResult()" id="saveBtn" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition">
        📧 メールで結果を受け取る
      </button>
      <button onclick="window.print()" class="w-full border-2 border-green-600 text-green-700 font-bold py-3 rounded-2xl hover:bg-green-50 transition">
        🖨 印刷・PDF保存
      </button>
      <button onclick="restartAssessment()" class="w-full border border-gray-300 text-gray-500 py-3 rounded-2xl hover:bg-gray-50 transition text-sm">
        🔄 最初からやり直す
      </button>
    </div>

    <p id="savedMessage" class="text-center text-green-600 font-bold text-sm mt-4 hidden">✅ 結果を保存しました</p>
    <p id="savedError" class="text-center text-red-500 text-sm mt-4 hidden">⚠️ 保存に失敗しました。後でお試しください。</p>
  </div>

</main>

// 状態管理
let state = {
  currentCategoryIndex: 0,
  currentQuestionIndex: 0,
  answers: {},
  companyName: '',
  industry: '',
  respondentName: '',
  email: '',
  totalAnswered: 0
};

const totalQuestions = categories.reduce((sum, c) => sum + c.questions.length, 0);

function startAssessment() {
  const name = document.getElementById('companyName').value.trim();
  if (!name) {
    document.getElementById('companyName').focus();
    document.getElementById('companyName').classList.add('ring-2', 'ring-red-400');
    return;
  }
  state.companyName = name;
  state.industry = document.getElementById('industry').value;
  state.respondentName = document.getElementById('respondentName').value.trim();
  state.email = document.getElementById('email').value.trim();
  if (!state.email) {
    document.getElementById('email').focus();
    document.getElementById('email').classList.add('ring-2', 'ring-red-400');
    return;
  }
  state.currentCategoryIndex = 0;
  state.currentQuestionIndex = 0;
  state.answers = {};
  state.totalAnswered = 0;

  showScreen('questions');
  document.getElementById('progressInfo').classList.remove('hidden');
  document.getElementById('progressBar').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const cat = categories[state.currentCategoryIndex];
  const q = cat.questions[state.currentQuestionIndex];
  const globalIndex = getGlobalIndex();

  document.getElementById('categoryIcon').textContent = cat.icon;
  document.getElementById('categoryName').textContent = cat.name;
  document.getElementById('questionText').textContent = q;
  document.getElementById('questionNumber').textContent =
    `${cat.name} ${state.currentQuestionIndex + 1} / ${cat.questions.length}問目`;

  document.getElementById('currentQ').textContent = globalIndex + 1;
  document.getElementById('totalQ').textContent = totalQuestions;

  const pct = (globalIndex / totalQuestions) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('backBtn').style.opacity = globalIndex === 0 ? '0.3' : '1';
  document.getElementById('backBtn').disabled = globalIndex === 0;

  // 保存済みの回答を反映
  const key = `${state.currentCategoryIndex}_${state.currentQuestionIndex}`;
  selectedAnswer = (key in state.answers) ? state.answers[key] : null;
  updateAnswerUI();

  // フェードイン
  const card = document.querySelector('#screen-questions .bg-white');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function getGlobalIndex() {
  let idx = 0;
  for (let i = 0; i < state.currentCategoryIndex; i++) {
    idx += categories[i].questions.length;
  }
  return idx + state.currentQuestionIndex;
}

let selectedAnswer = null;

function selectAnswer(pts) {
  selectedAnswer = pts;
  updateAnswerUI();
}

function updateAnswerUI() {
  [3, 2, 1, 0].forEach(pts => {
    const btn = document.getElementById('opt-' + pts);
    if (!btn) return;
    btn.classList.remove('ans-idle', 'ans-selected', 'ans-dim');
    if (selectedAnswer === null) {
      btn.classList.add('ans-idle');
    } else if (selectedAnswer === pts) {
      btn.classList.add('ans-selected');
    } else {
      btn.classList.add('ans-dim');
    }
  });
  const confirmBtn = document.getElementById('confirmBtn');
  if (confirmBtn) {
    confirmBtn.disabled = selectedAnswer === null;
    confirmBtn.classList.toggle('opacity-40', selectedAnswer === null);
    confirmBtn.classList.toggle('opacity-100', selectedAnswer !== null);
    confirmBtn.classList.toggle('hover:opacity-90', selectedAnswer !== null);
  }
}

function confirmAnswer() {
  if (selectedAnswer === null) return;
  const key = `${state.currentCategoryIndex}_${state.currentQuestionIndex}`;
  const isNew = !(key in state.answers);
  state.answers[key] = selectedAnswer;
  if (isNew) state.totalAnswered++;
  selectedAnswer = null;

  const cat = categories[state.currentCategoryIndex];
  if (state.currentQuestionIndex < cat.questions.length - 1) {
    state.currentQuestionIndex++;
  } else if (state.currentCategoryIndex < categories.length - 1) {
    state.currentCategoryIndex++;
    state.currentQuestionIndex = 0;
  } else {
    showResult();
    return;
  }
  renderQuestion();
}

function goBack() {
  if (state.currentQuestionIndex > 0) {
    state.currentQuestionIndex--;
  } else if (state.currentCategoryIndex > 0) {
    state.currentCategoryIndex--;
    state.currentQuestionIndex = categories[state.currentCategoryIndex].questions.length - 1;
  }
  renderQuestion();
}

function calcScores() {
  const catScores = {};
  categories.forEach((cat, ci) => {
    let score = 0;
    cat.questions.forEach((_, qi) => {
      const key = `${ci}_${qi}`;
      score += state.answers[key] || 0;
    });
    catScores[cat.id] = { score, max: cat.maxScore, pct: Math.round((score / cat.maxScore) * 100) };
  });
  const totalScore = Object.values(catScores).reduce((s, c) => s + c.score, 0);
  return { catScores, totalScore };
}

function getRank(pct) {
  if (pct >= 89) return { rank: 'S', label: '環境経営先進企業', color: '#7c3aed', bg: '#f3e8ff' };
  if (pct >= 75) return { rank: 'A', label: '環境経営優良企業', color: '#059669', bg: '#d1fae5' };
  if (pct >= 60) return { rank: 'B', label: '環境経営取組企業', color: '#d97706', bg: '#fef3c7' };
  if (pct >= 40) return { rank: 'C', label: '環境経営基礎段階', color: '#ea580c', bg: '#ffedd5' };
  return { rank: 'D', label: '環境経営要強化', color: '#dc2626', bg: '#fee2e2' };
}

function showResult() {

  document.getElementById('progressInfo').classList.add('hidden');

        label: '達成率（%）',

  // アドバイス
  const adviceList = document.getElementById('adviceList');
  adviceList.innerHTML = '';
  const adviceData = {

      mid: '省エネ設備への投資や再エネ契約切り替えを検討してみましょう。補助金制度も活用できます。',
      low: 'まずはエネルギー使用量の「見える化」から始めましょう。電気・ガスの月次記録が第一歩です。'
    },
    waste: {
      high: '廃棄物管理は高水準です。廃棄物ゼロ（ゼロエミッション）への挑戦も視野に入れてください。',
      mid: '廃棄物の分別・リサイクル率向上と、マニフェスト管理の徹底を進めましょう。',
      low: '廃棄物の種類別記録と、産業廃棄物の適正処理から取り組みを始めましょう。'
    },
    water: {
      high: '水資源管理は良好です。水使用量データの対外開示や節水型設備の更新を検討してください。',
      mid: '節水型設備の導入と月次の水道使用量記録を始めましょう。水漏れチェックも効果的です。',
      low: 'まずは水道使用量を毎月チェックすることから始めましょう。節水コマの設置は低コストで効果的です。'
    },
    ghg: {
      high: 'CO2管理は先進的です。Scope3の把握やSBT認定、TCFDへの対応でリーダーシップを示しましょう。',
      mid: 'Scope1・2の把握ができたら、削減目標を設定しましょう。J-クレジット活用も検討を。',
      low: 'まず電気・ガス・燃料のCO2換算から始めましょう。排出係数を使った簡易計算で十分です。'
    },
    procurement: {
      high: 'グリーン調達は優秀です。サプライヤーへの環境基準要請や生物多様性配慮にも拡張しましょう。',
      mid: '調達基準にグリーン購入の視点を加え、エコマーク製品の優先購入を始めましょう。',

      low: '自社に適用される環境法令の洗い出しが最優先です。専門家への相談も活用してください。'
    },

      high: '環境マネジメント体制は優秀です。ISO14001取得やTCFD開示で信頼性をさらに高めましょう。',
      mid: '環境方針の策定と環境担当者の任命からPDCAサイクルを回し始めましょう。',

    },

      high: 'SDGs対応・情報開示は優秀です。統合報告書やサステナビリティレポートの発行を検討しましょう。',
      mid: 'SDGsの目標と自社事業の関連を整理し、Webサイトで発信することを始めましょう。',

    const div = document.createElement('div');
    div.className = 'p-3 rounded-xl border-l-4 bg-gray-50';

async function saveResult() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ 保存中...';
  btn.disabled = true;

  const { catScores, totalScore } = calcScores();
  const pct = Math.round((totalScore / 180) * 100);
  const { rank } = getRank(pct);

  try {
    const { error } = await db.from('env_assessment_results').insert({
      company_name: state.companyName,
      industry: state.industry || null,
      respondent_name: state.respondentName || null,
      email: state.email || null,
      total_score: totalScore,
      max_score: 180,
      rank: rank,
      category_scores: catScores,
      answers: state.answers,
      assessment_type: 'full'
    });
    if (error) throw error;

    if (state.email) {
      try {
        await fetch('https://qyepcsprvdocyjiyqmiv.supabase.co/functions/v1/send-assessment-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: state.email, companyName: state.companyName, industry: state.industry,
            totalScore, maxScore: 180, rank, categoryScores: catScores, assessmentType: 'full'
          })
        });
      } catch(e) { console.warn('Email send failed:', e); }
    }

    const msgEl = document.getElementById('savedMessage');
    msgEl.textContent = state.email ? `✅ 結果を保存し、${state.email} に送信しました` : '✅ 結果を保存しました';
    msgEl.classList.remove('hidden');
    btn.textContent = '✅ 保存済み';
  } catch (e) {
    console.error(e);
    document.getElementById('savedError').classList.remove('hidden');
    btn.textContent = '📤 結果を保存する';
    btn.disabled = false;
  }
}

function showScreen(name) {
  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-questions').classList.add('hidden');
  document.getElementById('screen-result').classList.add('hidden');
  const el = document.getElementById(`screen-${name}`);
  el.classList.remove('hidden');
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
  window.scrollTo(0, 0);
}

function restartAssessment() {
  state = { currentCategoryIndex: 0, currentQuestionIndex: 0, answers: {}, companyName: '', industry: '', respondentName: '', email: '', totalAnswered: 0 };
  document.getElementById('companyName').value = '';
  document.getElementById('industry').value = '';
  document.getElementById('respondentName').value = '';
  document.getElementById('email').value = '';
  document.getElementById('savedMessage').classList.add('hidden');
  document.getElementById('savedError').classList.add('hidden');
  document.getElementById('saveBtn').textContent = '📤 結果を保存する';
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressInfo').classList.add('hidden');
  document.getElementById('progressBar').classList.add('hidden');
  showScreen('start');
}
